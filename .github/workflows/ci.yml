name: CI

on:
  push:
    branches: ["testing"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/proxy?schema=public
      JWT_SECRET: ci-secret
      NEXT_PUBLIC_APP_NAME: Proxy
      PAYSTACK_SECRET_KEY: ""
      PAYSTACK_PUBLIC_KEY: ""
      RESEND_API_KEY: re_test_key
      EMAIL_FROM: Proxy <onboarding@resend.dev>

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
